   </ul>
   <form action="https://localhost/login.php" autocomplete="on"> <!--로그인 버튼을 누르면 action에 적혀있는 주소로 정보를보낸다-->
        <p>id : <input type="text" name="id"  placeholder="id"  pattern="[a-zA-Z]{6,10}" required autofocus></p> <!--6자 이상 10자 이하-->
        <p>password : <input type="password" name="password" placeholder="password" required pattern=".{6,}" autocomplete="off"></p>
        <p>address : <input type="text" name="address" placeholder="address" required></p>
        <p><input type = "submit"></p>
    </form>
    <form action="https://localhost/login.php" method="post"> <!--get방식은 url에 정보가드러나지만 post방식은 url에 정보가 드러나지않는다-->
        <p><label for="id_txt">id : </label><input id="id_txt" type="text" name="id" value="ID"></p>
        <p><label for="password">password : </label><input id="password" type="password" name="password" value="password"></p>
        <p>textarea : <textarea name="textarea" cols="30" rows="10" placeholder="Textarea"></textarea></p>
        <p><input type="submit" value="submit"></p>
        <p><label><input type="checkbox" name="color">Red</label></p>
        <p><label><input type="checkbox" name="color">Blue</label></p>
    </form>
</body>
